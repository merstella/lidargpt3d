datasets:
  NuScenes_caption:
    data_type: point_cloud
    build_info:
      data_root: ../nuscenes
      version: v1.0-trainval

      # dump nội bộ (jsonl hoặc json list)
      ann_path: ./ann/nucaption_train.jsonl

      pointnum: 8192
      normalize_pc: true
      use_intensity: true
      use_time_or_ring: true
      return_dim: 6