model:
  arch: minigpt_3d
  model_type: pretrain
  max_txt_len: 500
  end_sym: "###"
  prompt_template: "Instruct: {} /n Output: "
  llama_model: "./params_weight/Phi_2"

  # Update these two checkpoints to your NuScenes-trained weights.
  ckpt: "./output/test/stage_3/checkpoint_2.pth"
  second_ckpt: "./output/test/stage_4/checkpoint_0.pth"

  lora_r: 64
  lora_alpha: 16
  pc_linear_layer: 2
  use_MQE: true
  query_expert_router_type: "Sparse Router"
  query_expert_num: 8
  query_expert_top_k: 2
  QFormer_lora_r: 8
  QFormer_lora_alpha: 16
  QFormer_lora_module: ["query", "key", "value"]

evaluation_flag: true
